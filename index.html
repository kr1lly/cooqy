<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/cooqy.svg">
  <title>Cooqy</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="darkmode.js" defer></script>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <!-- Left -->
      <a href="index.html" class="logo">Cooqy</a>

      <!-- Center -->
      <nav class="nav-center">
        <a href="index.html">Home</a>
        <a href="index.html">About Us</a>
        <a href="index.html">Contact</a>
      </nav>

      <!-- Right -->
      <div class="header-right">
        <div class="menu-toggle">&#9776;</div>

        <!-- Theme Switcher -->
        <button class="theme-switcher" id="theme-switcher">
          <!-- Moon icon (light mode) -->
          <svg class="moon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/>
          </svg>
          <!-- Sun icon (dark mode) -->
          <svg class="sun" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container hero-content">
      <div class="text">
        <h1>Smart Food Tech</h1>
        <p>Where Culinary Meets Technology.</p>
        <a href="#signup" class="cta-button">Start Now</a>
      </div>
      <div class="image">
        <img src="pic3.png" alt="Cooqy hero image">
      </div>
    </div>
  </section>

  <!-- Dishes Grid Section -->
  <section class="dishes">
    <div class="container">
      <h2>See What You Can Cook</h2>

      <!-- Row 1 -->
      <div class="dish-grid">
        <div class="dish"><img src="https://cdn.apartmenttherapy.info/image/upload/f_jpg,q_auto:eco,c_fill,g_auto,w_1500,ar_16:9/k%2FPhoto%2FRecipes%2F2024-04-filipino-adobo%2Ffilipino-adobo-426" alt="Dish 1"></div>
        <div class="dish"><img src="https://cdn.loveandlemons.com/wp-content/uploads/2023/11/thanksgiving-side-dishes-2.jpg" alt="Dish 2"></div>
        <div class="dish"><img src="https://images.yummy.ph/yummy/uploads/2010/03/easy-pancit-bihon.jpg" alt="Dish 3"></div>

        <!-- Row 2 -->
        <div class="dish blurred"><img src="https://www.tasteofhome.com/wp-content/uploads/2025/09/45-Dump-and-Go-Slow-Cooker-Side-Dishes_Slow-Cooker-Broccoli-Casserole_TOHD24_9883_EricKleinberg_2_FT.jpg" alt="Dish 4"></div>
        <div class="dish blurred"><img src="https://blog.swiggy.com/wp-content/uploads/2024/09/Image-1_-Thepla-1024x538.png" alt="Dish 5"></div>
        <div class="dish blurred"><img src="https://www.ktchnrebel.com/wp-content/uploads/2023/12/Kalbsbries_Rumohr-Eckart_Witzigmann_c_Peter_FischerFilter.jpg" alt="Dish 6"></div>

        <!-- Row 3 -->
        <div class="dish heavy-blur"><img src="https://cdn.apartmenttherapy.info/image/upload/f_auto,q_auto:eco,c_fill,g_center,w_730,h_913/k%2FPhoto%2FRecipes%2F2023-12-parmesan-crusted-carrots%2Fparmesan-crusted-carrots-711" alt="Dish 7"></div>
        <div class="dish heavy-blur"><img src="https://tastephilippines.com/wp-content/uploads/2020/08/filipino-palabok.jpg" alt="Dish 8"></div>
        <div class="dish heavy-blur"><img src="https://res.cloudinary.com/worldpackers/image/upload/c_limit,f_auto,q_auto,w_1140/qcpfceewhp9coaffc3jp" alt="Dish 9"></div>
      </div>

      <!-- Row 4 container with overlay -->
      <div class="fourth-row-container">
        <div class="dish barely"><img src="https://successrice.com/wp-content/uploads/2025/02/Sinangag-Recipe-%E2%80%93-Jasmine-Rice-%E2%80%93-3-4-026-1540x870-PNG-1024x578.jpg" alt="Dish 10"></div>
        <div class="dish barely"><img src="https://filipinoeggrolls.com/wp-content/uploads/2023/03/freshly-cooked-filipino-food-called-crispy-pata.jpg" alt="Dish 11"></div>
        <div class="dish barely"><img src="https://www.kawalingpinoy.com/wp-content/uploads/2016/08/ginisang-togue-5.jpg" alt="Dish 12"></div>

        <!-- Unlock overlay -->
        <div class="unlock-overlay">
          <p>Countless more recipes awaits you!</p>
          <a href="#signup" class="cta-button">Sign Up / Log In</a>
        </div>
      </div>

    </div>
  </section>

  <!-- Signup Section -->
  <section class="signup" id="signup">
    <div class="container">
      <h2>Join Cooqy Today</h2>
      <p>Get updates, recipes, and food-tech insights.</p>
      <form>
        <input type="email" placeholder="Enter your email" required>
        <button type="submit">Sign Up</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 Cooqy. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
